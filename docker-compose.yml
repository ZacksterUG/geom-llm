version: '3.8'

services:
  geom-db:
    image: postgres:15-alpine
    container_name: geom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - geom-postgres-data:/var/lib/postgresql/data
      - ./liquibase/changelogs:/docker-entrypoint-initdb.d/changelogs:ro
    networks:
      - geom-network
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB

  geom-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: geom-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - geom-pgadmin-data:/var/lib/pgadmin
    networks:
      - geom-network
    depends_on:
      - geom-db

  geom-ollama:
    image: ollama/ollama:latest
    container_name: geom-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - geom-ollama-models:/root/.ollama
    networks:
      - geom-network
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Service to pull the Ollama model (run once with: docker-compose --profile pull-model up geom-ollama-pull)
  geom-ollama-pull:
    image: ollama/ollama:latest
    container_name: geom-ollama-pull
    profiles:
      - pull-model
    depends_on:
      geom-ollama:
        condition: service_healthy
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    volumes:
      - geom-ollama-models:/root/.ollama
    networks:
      - geom-network
    command: >
      sh -c "sleep 5 && ollama pull ${OLLAMA_MODEL} && echo 'Model ${OLLAMA_MODEL} pulled successfully'"

  geom-liquibase:
    image: liquibase/liquibase:4.27
    volumes:
      - ./liquibase:/liquibase/changelog
    command: --changeLogFile=changelog/changelog-master.xml --url=jdbc:postgresql://geom-db:5432/stereometry_db --username=${POSTGRES_USER} --password=${POSTGRES_PASSWORD} update
    depends_on:
      geom-db:
        condition: service_healthy
    networks:
      - geom-network

  geom-backend:
    build: ./backend
    container_name: geom-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@geom-db:5432/${POSTGRES_DB}
      OLLAMA_URL: http://geom-ollama:11434/api/chat
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/app
    networks:
      - geom-network
    depends_on:
      - geom-db
      - geom-ollama

  geom-frontend:
    build: ./frontend
    container_name: geom-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - geom-network
    depends_on:
      - geom-backend

volumes:
  geom-postgres-data:
  geom-pgadmin-data:
  geom-ollama-models:

networks:
  geom-network:
    driver: bridge
    name: ${NETWORK_NAME}